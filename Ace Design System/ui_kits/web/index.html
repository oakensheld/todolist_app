<!-- @dsCard group="Web app" viewport="1280x760" name="Today dashboard" subtitle="Sidebar, task list, progress rail" -->
<!-- @startingPoint section="Web app" subtitle="Full planner dashboard — sidebar + tasks + rail" viewport="1280x800" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Ace — Today</title>
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  html, body { margin: 0; height: 100%; }
  body { font-family: var(--font-sans); background: var(--surface-page); color: var(--text-strong); }
  #root { height: 100vh; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
// Override bundle versions with fixed quick-add + dynamic sidebar count
function TodayView({ tasks, onToggle, onAdd, filter, onFilter }) {
  const { Button, Input, Tabs, ProgressRing, ProgressBar, Card, Badge } = window.AceDesignSystem_db6642;
  const [draft, setDraft] = React.useState('');
  const visible = tasks.filter(t => filter === 'all' ? true : filter === 'done' ? t.done : !t.done);
  const done = tasks.filter(t => t.done).length;
  const submit = (e) => {
    if (e) e.preventDefault();
    const value = draft.trim();
    if (!value) return;
    onAdd(value);
    setDraft('');
  };
  return (
    <div style={{ display: 'flex', flex: 1, minWidth: 0, height: '100%' }}>
      <div style={{ flex: 1, minWidth: 0, display: 'flex', flexDirection: 'column', overflow: 'auto' }}>
        <div style={{ padding: '28px 32px 0', maxWidth: 760, width: '100%', margin: '0 auto', boxSizing: 'border-box' }}>
          <div style={{ display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between', gap: 16 }}>
            <div>
              <div style={{ fontSize: 12, fontWeight: 700, letterSpacing: '0.06em', textTransform: 'uppercase', color: 'var(--cat-study)' }}>Monday · Jun 22</div>
              <h1 style={{ margin: '4px 0 0', fontSize: 34, fontWeight: 800, letterSpacing: '-0.02em', color: 'var(--text-strong)' }}>Today's focus</h1>
            </div>
            <div style={{ fontSize: 14, color: 'var(--text-muted)' }}>{done} of {tasks.length} done</div>
          </div>
          <form onSubmit={submit} style={{ display: 'flex', gap: 10, margin: '20px 0 8px' }}>
            <div style={{ flex: 1 }}>
              <Input value={draft} onChange={setDraft} placeholder="Add a task and press Enter…"
                onKeyDown={(e) => { if (e.key === 'Enter') { e.preventDefault(); submit(e); } }} />
            </div>
            <Button variant="primary" type="submit">Add</Button>
          </form>
          <div style={{ margin: '14px 0 6px' }}>
            <Tabs value={filter} onChange={onFilter} items={[
              { value: 'open', label: 'To do', count: tasks.filter(t => !t.done).length },
              { value: 'done', label: 'Done', count: done },
              { value: 'all', label: 'All' },
            ]} />
          </div>
        </div>
        <div style={{ maxWidth: 760, width: '100%', margin: '0 auto', padding: '0 32px 40px', boxSizing: 'border-box' }}>
          <Card padding="0" style={{ overflow: 'hidden' }}>
            {visible.length === 0 ? (
              <div style={{ padding: '48px 0', textAlign: 'center', color: 'var(--text-faint)' }}>
                <i data-lucide="check-check" style={{ width: 28, height: 28 }}></i>
                <div style={{ marginTop: 8, fontSize: 15 }}>Nothing here — nice work.</div>
              </div>
            ) : visible.map(t => <TaskRow key={t.id} task={t} onToggle={onToggle} />)}
          </Card>
        </div>
      </div>
      <aside style={{ width: 300, flex: 'none', borderLeft: '1px solid var(--border-subtle)', background: 'var(--surface-card)', padding: 24, boxSizing: 'border-box', overflow: 'auto', display: 'flex', flexDirection: 'column', gap: 18 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 16 }}>
          <ProgressRing value={done} max={tasks.length || 1} size={64} />
          <div>
            <div style={{ fontSize: 15, fontWeight: 700, color: 'var(--text-strong)' }}>Daily goal</div>
            <div style={{ fontSize: 13, color: 'var(--text-muted)' }}>{tasks.length - done} tasks to go</div>
          </div>
        </div>
        <div>
          <p style={{ fontSize: 11, fontWeight: 700, letterSpacing: '0.06em', textTransform: 'uppercase', color: 'var(--text-faint)', margin: '0 0 12px' }}>By category</p>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
            {[['Study', 'var(--cat-study)', 4, 6], ['Project', 'var(--cat-project)', 1, 3], ['Interview', 'var(--cat-interview)', 2, 4]].map(([n, c, v, m]) => (
              <div key={n}>
                <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 13, marginBottom: 6 }}>
                  <span style={{ color: 'var(--text-body)', fontWeight: 500 }}>{n}</span>
                  <span style={{ fontFamily: 'var(--font-mono)', color: 'var(--text-muted)' }}>{v}/{m}</span>
                </div>
                <ProgressBar value={v} max={m} color={c} height={6} />
              </div>
            ))}
          </div>
        </div>
        <div style={{ marginTop: 'auto', background: 'var(--cat-interview-bg)', borderRadius: 'var(--radius-lg)', padding: 16 }}>
          <Badge tone="interview" dot>Interview</Badge>
          <div style={{ fontSize: 15, fontWeight: 700, color: 'var(--text-strong)', margin: '10px 0 2px' }}>Google · Phone screen</div>
          <div style={{ fontSize: 13, color: 'var(--text-body)' }}>Thursday, 2:00 PM</div>
          <div style={{ fontFamily: 'var(--font-mono)', fontSize: 12, fontWeight: 600, color: 'var(--cat-interview)', marginTop: 8 }}>in 3 days</div>
        </div>
      </aside>
    </div>
  );
}

function Sidebar({ active, onNavigate, lists, activeList, todayCount }) {
  const { Avatar, Badge } = window.AceDesignSystem_db6642;
  const nav = [
    { id: 'today', label: 'Today', icon: 'sun', count: todayCount },
    { id: 'upcoming', label: 'Upcoming', icon: 'calendar-days' },
    { id: 'all', label: 'All tasks', icon: 'list-checks' },
    { id: 'interviews', label: 'Interview prep', icon: 'briefcase' },
  ];
  const catColor = { study: 'var(--cat-study)', project: 'var(--cat-project)', interview: 'var(--cat-interview)', personal: 'var(--cat-personal)' };
  const item = (selected) => ({
    display: 'flex', alignItems: 'center', gap: 10, height: 38, padding: '0 10px',
    borderRadius: 'var(--radius-md)', cursor: 'pointer', fontSize: 14,
    fontWeight: selected ? 700 : 500,
    color: selected ? 'var(--color-primary)' : 'var(--text-body)',
    background: selected ? 'var(--blue-50)' : 'transparent',
  });
  return (
    <aside style={{
      width: 248, flex: 'none', height: '100%', boxSizing: 'border-box',
      background: 'var(--surface-card)', borderRight: '1px solid var(--border-subtle)',
      display: 'flex', flexDirection: 'column', padding: '16px 12px',
    }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '4px 8px 18px' }}>
        <img src="../../assets/logo-mark.svg" width="30" height="30" alt="Ace" />
        <span style={{ fontSize: 20, fontWeight: 800, letterSpacing: '-0.02em', color: 'var(--text-strong)' }}>Ace</span>
      </div>
      <nav style={{ display: 'flex', flexDirection: 'column', gap: 2 }}>
        {nav.map(n => (
          <div key={n.id} style={item(active === n.id)} onClick={() => onNavigate(n.id)}>
            <i data-lucide={n.icon} style={{ width: 18, height: 18 }}></i>
            <span style={{ flex: 1 }}>{n.label}</span>
            {n.count != null && <Badge tone={active === n.id ? 'primary' : 'neutral'} size="sm">{n.count}</Badge>}
          </div>
        ))}
      </nav>
      <p style={{ fontSize: 11, fontWeight: 700, letterSpacing: '0.06em', textTransform: 'uppercase', color: 'var(--text-faint)', margin: '22px 10px 8px' }}>Lists</p>
      <nav style={{ display: 'flex', flexDirection: 'column', gap: 2 }}>
        {lists.map(l => (
          <div key={l.id} style={item(activeList === l.id && active === 'list')} onClick={() => onNavigate('list', l.id)}>
            <span style={{ width: 9, height: 9, borderRadius: 3, background: catColor[l.cat], flex: 'none' }}></span>
            <span style={{ flex: 1 }}>{l.name}</span>
            <span style={{ fontFamily: 'var(--font-mono)', fontSize: 12, color: 'var(--text-faint)' }}>{l.open}</span>
          </div>
        ))}
      </nav>
      <div style={{ marginTop: 'auto', display: 'flex', alignItems: 'center', gap: 10, padding: '10px 8px', borderTop: '1px solid var(--border-subtle)' }}>
        <Avatar name="Maya Chen" size="sm" />
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ fontSize: 13, fontWeight: 600, color: 'var(--text-strong)' }}>Maya Chen</div>
          <div style={{ fontSize: 11, color: 'var(--text-muted)' }}>Junior · CS</div>
        </div>
        <i data-lucide="settings" style={{ width: 16, height: 16, color: 'var(--text-faint)' }}></i>
      </div>
    </aside>
  );
}

function TaskRow({ task, onToggle, selected, onSelect }) {
  const { Checkbox, Badge } = window.AceDesignSystem_db6642;
  const [hover, setHover] = React.useState(false);
  const catColor = { study: 'var(--cat-study)', project: 'var(--cat-project)', interview: 'var(--cat-interview)', personal: 'var(--cat-personal)' };
  const catTone = { study: 'study', project: 'project', interview: 'interview', personal: 'personal' };
  const overdue = task.overdue && !task.done;
  const selectable = typeof onSelect === 'function';
  return (
    <div
      onClick={selectable ? () => onSelect(task.id) : undefined}
      onMouseEnter={() => setHover(true)} onMouseLeave={() => setHover(false)}
      style={{
        display: 'flex', alignItems: 'center', gap: 12, padding: '12px 14px',
        background: selected ? 'var(--blue-50)' : hover ? 'var(--surface-hover)' : 'var(--surface-card)',
        borderBottom: '1px solid var(--border-subtle)', transition: 'background 120ms ease',
        cursor: selectable ? 'pointer' : 'default',
        outline: selected ? '2px solid var(--color-primary)' : 'none', outlineOffset: -2,
      }}
    >
      <span onClick={selectable ? (e) => e.stopPropagation() : undefined}>
        <Checkbox checked={task.done} onChange={() => onToggle(task.id)} color={catColor[task.cat]} />
      </span>
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{
          fontSize: 15, fontWeight: 500,
          color: task.done ? 'var(--text-faint)' : 'var(--text-strong)',
          textDecoration: task.done ? 'line-through' : 'none',
        }}>{task.title}</div>
        {task.note && <div style={{ fontSize: 13, color: 'var(--text-muted)', marginTop: 2 }}>{task.note}</div>}
      </div>
      <Badge tone={catTone[task.cat]} dot>{task.list}</Badge>
      <div style={{
        display: 'flex', alignItems: 'center', gap: 5, minWidth: 88, justifyContent: 'flex-end',
        fontFamily: 'var(--font-mono)', fontSize: 12, fontWeight: 500,
        color: overdue ? 'var(--danger)' : 'var(--text-muted)',
      }}>
        <i data-lucide={overdue ? 'alert-circle' : 'clock'} style={{ width: 13, height: 13 }}></i>
        {task.due}
      </div>
      <i data-lucide="grip-vertical" style={{ width: 16, height: 16, color: 'var(--ink-300)', opacity: hover ? 1 : 0 }}></i>
    </div>
  );
}

// Extra page views (inlined so file:// works without fetching external .jsx)
function UpcomingView({ tasks, onToggle }) {
  const { Card } = window.AceDesignSystem_db6642;
  const TODAY_KEY = '2026-06-22';
  const SCHEDULED_DATES = { today: TODAY_KEY, tomorrow: '2026-06-23', wed: '2026-06-25', later: '2026-06-28' };
  const MONTHS = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
  const WEEKDAYS = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
  const navBtn = {
    width: 34, height: 34, display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
    border: '1px solid var(--border-subtle)', borderRadius: 'var(--radius-md)',
    background: 'var(--surface-card)', cursor: 'pointer', color: 'var(--text-body)',
  };

  const [viewYear, setViewYear] = React.useState(2026);
  const [viewMonth, setViewMonth] = React.useState(5);
  const [selectedKey, setSelectedKey] = React.useState(TODAY_KEY);

  const dateKey = (y, m, d) => `${y}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
  const taskDateKey = (t) => t.dateKey || (t.scheduled && SCHEDULED_DATES[t.scheduled]) || null;

  const countsByDay = React.useMemo(() => {
    const map = {};
    tasks.forEach(t => {
      const key = taskDateKey(t);
      if (!key) return;
      if (!map[key]) map[key] = { total: 0, open: 0 };
      map[key].total += 1;
      if (!t.done) map[key].open += 1;
    });
    return map;
  }, [tasks]);

  const buildGrid = (year, month) => {
    const first = new Date(year, month, 1);
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const startPad = (first.getDay() + 6) % 7;
    const cells = [];
    for (let i = 0; i < startPad; i++) cells.push(null);
    for (let d = 1; d <= daysInMonth; d++) cells.push(d);
    while (cells.length % 7 !== 0) cells.push(null);
    return cells;
  };

  const shiftMonth = (delta) => {
    const d = new Date(viewYear, viewMonth + delta, 1);
    setViewYear(d.getFullYear());
    setViewMonth(d.getMonth());
  };

  const formatLabel = (key) => {
    const [y, m, d] = key.split('-').map(Number);
    const date = new Date(y, m - 1, d);
    const weekday = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'][date.getDay()];
    const month = MONTHS[m - 1].slice(0, 3);
    if (key === TODAY_KEY) return `Today · ${weekday} · ${month} ${d}`;
    return `${weekday} · ${month} ${d}`;
  };

  const grid = buildGrid(viewYear, viewMonth);
  const dayTasks = tasks.filter(t => taskDateKey(t) === selectedKey);
  const openOnDay = dayTasks.filter(t => !t.done).length;

  return (
    <div style={{ flex: 1, minWidth: 0, display: 'flex', flexDirection: 'column', overflow: 'auto' }}>
      <div style={{ padding: '28px 32px 0', maxWidth: 760, width: '100%', margin: '0 auto', boxSizing: 'border-box' }}>
        <div style={{ fontSize: 12, fontWeight: 700, letterSpacing: '0.06em', textTransform: 'uppercase', color: 'var(--text-faint)' }}>Calendar</div>
        <h1 style={{ margin: '4px 0 0', fontSize: 34, fontWeight: 800, letterSpacing: '-0.02em', color: 'var(--text-strong)' }}>Upcoming</h1>
        <p style={{ margin: '8px 0 0', fontSize: 14, color: 'var(--text-muted)' }}>Pick a day to see what's scheduled.</p>
      </div>
      <div style={{ maxWidth: 760, width: '100%', margin: '0 auto', padding: '24px 32px 40px', boxSizing: 'border-box', display: 'flex', flexDirection: 'column', gap: 24 }}>
        <Card padding="20">
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 16 }}>
            <h2 style={{ margin: 0, fontSize: 17, fontWeight: 700, color: 'var(--text-strong)' }}>{MONTHS[viewMonth]} {viewYear}</h2>
            <div style={{ display: 'flex', gap: 4 }}>
              <button type="button" onClick={() => shiftMonth(-1)} aria-label="Previous month" style={navBtn}>
                <i data-lucide="chevron-left" style={{ width: 18, height: 18 }}></i>
              </button>
              <button type="button" onClick={() => { setViewYear(2026); setViewMonth(5); setSelectedKey(TODAY_KEY); }} style={{ ...navBtn, width: 'auto', padding: '0 10px', fontSize: 13, fontWeight: 600 }}>Today</button>
              <button type="button" onClick={() => shiftMonth(1)} aria-label="Next month" style={navBtn}>
                <i data-lucide="chevron-right" style={{ width: 18, height: 18 }}></i>
              </button>
            </div>
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: 4, marginBottom: 4 }}>
            {WEEKDAYS.map(w => (
              <div key={w} style={{ textAlign: 'center', fontSize: 11, fontWeight: 700, letterSpacing: '0.04em', color: 'var(--text-faint)', padding: '4px 0' }}>{w}</div>
            ))}
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: 4 }}>
            {grid.map((day, i) => {
              if (day == null) return <div key={`e-${i}`} />;
              const key = dateKey(viewYear, viewMonth, day);
              const isToday = key === TODAY_KEY;
              const isSelected = key === selectedKey;
              const stats = countsByDay[key];
              return (
                <button
                  key={key}
                  type="button"
                  onClick={() => setSelectedKey(key)}
                  style={{
                    aspectRatio: '1', border: isToday && !isSelected ? '2px solid var(--color-primary)' : '1px solid var(--border-subtle)',
                    borderRadius: 'var(--radius-md)', cursor: 'pointer', padding: 4,
                    background: isSelected ? 'var(--color-primary)' : 'var(--surface-card)',
                    color: isSelected ? '#fff' : 'var(--text-strong)',
                    display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 2,
                    transition: 'background 120ms ease, border-color 120ms ease',
                  }}
                >
                  <span style={{ fontSize: 15, fontWeight: isSelected || isToday ? 800 : 500 }}>{day}</span>
                  {stats && stats.open > 0 && (
                    <span style={{
                      fontFamily: 'var(--font-mono)', fontSize: 10, fontWeight: 600,
                      color: isSelected ? 'rgba(255,255,255,0.85)' : 'var(--color-primary)',
                    }}>{stats.open}</span>
                  )}
                </button>
              );
            })}
          </div>
        </Card>
        <section>
          <h2 style={{ margin: '0 0 10px', fontSize: 13, fontWeight: 700, letterSpacing: '0.04em', textTransform: 'uppercase', color: 'var(--text-faint)' }}>
            {formatLabel(selectedKey)}
            {dayTasks.length > 0 && <span style={{ fontWeight: 500, textTransform: 'none', letterSpacing: 0, color: 'var(--text-muted)' }}> · {openOnDay} open</span>}
          </h2>
          <Card padding="0" style={{ overflow: 'hidden' }}>
            {dayTasks.length === 0 ? (
              <div style={{ padding: '40px 0', textAlign: 'center', color: 'var(--text-faint)' }}>
                <i data-lucide="calendar-off" style={{ width: 28, height: 28 }}></i>
                <div style={{ marginTop: 8, fontSize: 15 }}>Nothing on this day.</div>
              </div>
            ) : dayTasks.map(t => <TaskRow key={t.id} task={t} onToggle={onToggle} />)}
          </Card>
        </section>
      </div>
    </div>
  );
}

function AllTasksView({ tasks, onToggle, onAdd, onDelete, lists }) {
  const { Card, Tabs, Button, Input } = window.AceDesignSystem_db6642;
  const [filter, setFilter] = React.useState('all');
  const [draft, setDraft] = React.useState('');
  const [listId, setListId] = React.useState('suanfa');
  const [dueDate, setDueDate] = React.useState('2026-06-22');
  const [dueTime, setDueTime] = React.useState('');
  const [selected, setSelected] = React.useState(() => new Set());

  React.useEffect(() => { setSelected(new Set()); }, [filter]);

  const filters = [
    { value: 'all', label: '全部' },
    ...lists.map(l => ({
      value: l.id,
      label: l.name,
      count: tasks.filter(t => t.listId === l.id && !t.done).length,
    })),
  ];

  const visible = filter === 'all' ? tasks : tasks.filter(t => t.listId === filter);
  const open = visible.filter(t => !t.done).length;
  const selectedCount = selected.size;

  const toggleSelect = (id) => {
    setSelected(prev => {
      const next = new Set(prev);
      if (next.has(id)) next.delete(id);
      else next.add(id);
      return next;
    });
  };

  const deleteSelected = () => {
    if (selectedCount === 0) return;
    onDelete([...selected]);
    setSelected(new Set());
  };

  const submit = (e) => {
    if (e) e.preventDefault();
    const title = draft.trim();
    if (!title) return;
    onAdd({ title, listId, dateKey: dueDate, dueTime: dueTime.trim() });
    setDraft('');
    setDueTime('');
  };

  const fieldLabel = { fontSize: 12, fontWeight: 600, color: 'var(--text-muted)', marginBottom: 6 };

  return (
    <div style={{ flex: 1, minWidth: 0, display: 'flex', flexDirection: 'column', overflow: 'auto' }}>
      <div style={{ padding: '28px 32px 0', maxWidth: 760, width: '100%', margin: '0 auto', boxSizing: 'border-box' }}>
        <div style={{ fontSize: 12, fontWeight: 700, letterSpacing: '0.06em', textTransform: 'uppercase', color: 'var(--text-faint)' }}>Everything</div>
        <h1 style={{ margin: '4px 0 0', fontSize: 34, fontWeight: 800, letterSpacing: '-0.02em', color: 'var(--text-strong)' }}>All tasks</h1>
        <p style={{ margin: '8px 0 20px', fontSize: 14, color: 'var(--text-muted)' }}>{open} open · {visible.length} total</p>

        <Card padding="20" style={{ marginBottom: 20 }}>
          <form onSubmit={submit} style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
            <div>
              <div style={fieldLabel}>Task title</div>
              <Input value={draft} onChange={setDraft} placeholder="What do you need to do?" />
            </div>
            <div>
              <div style={fieldLabel}>Type</div>
              <Tabs variant="pill" value={listId} onChange={setListId} items={lists.map(l => ({ value: l.id, label: l.name }))} />
            </div>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr auto', gap: 10, alignItems: 'end' }}>
              <div>
                <div style={fieldLabel}>Due date</div>
                <Input type="date" value={dueDate} onChange={setDueDate} />
              </div>
              <div>
                <div style={fieldLabel}>Due time</div>
                <Input type="time" value={dueTime} onChange={setDueTime} placeholder="Optional" />
              </div>
              <Button variant="primary" type="submit" style={{ height: 42 }}>Add</Button>
            </div>
          </form>
        </Card>

        <Tabs value={filter} onChange={setFilter} items={filters} />
      </div>
      <div style={{ maxWidth: 760, width: '100%', margin: '0 auto', padding: '16px 32px 40px', boxSizing: 'border-box' }}>
        {selectedCount > 0 && (
          <div style={{
            display: 'flex', alignItems: 'center', justifyContent: 'space-between',
            marginBottom: 12, padding: '10px 14px', background: 'var(--blue-50)',
            borderRadius: 'var(--radius-md)', border: '1px solid var(--blue-100)',
          }}>
            <span style={{ fontSize: 14, fontWeight: 600, color: 'var(--text-strong)' }}>{selectedCount} selected</span>
            <div style={{ display: 'flex', gap: 8 }}>
              <Button variant="ghost" onClick={() => setSelected(new Set())}>Cancel</Button>
              <Button variant="danger" onClick={deleteSelected}>Delete</Button>
            </div>
          </div>
        )}

          {visible.length === 0 ? (
            <div style={{ padding: '48px 0', textAlign: 'center', color: 'var(--text-faint)' }}>
              <i data-lucide="inbox" style={{ width: 28, height: 28 }}></i>
              <div style={{ marginTop: 8, fontSize: 15 }}>No tasks in this category.</div>
            </div>
          ) : visible.map(t => (
            <TaskRow key={t.id} task={t} onToggle={onToggle} selected={selected.has(t.id)} onSelect={toggleSelect} />
          ))}
        </Card>
      </div>
    </div>
  );
}

const TODAY_KEY = '2026-06-22';
const API_BASE = 'http://localhost:3001/api';

function buildDue(dateKey, dueTime) {
  if (dateKey === TODAY_KEY) return dueTime || 'today';
  const [, , d] = dateKey.split('-').map(Number);
  const label = `Jun ${d}`;
  return dueTime ? `${label} · ${dueTime}` : label;
}

function dateKeyToScheduled(dateKey) {
  const map = { '2026-06-22': 'today', '2026-06-23': 'tomorrow', '2026-06-25': 'wed', '2026-06-28': 'later' };
  return map[dateKey] || null;
}

function decorate(task) {
  return { ...task, due: buildDue(task.dateKey, task.dueTime) };
}

async function apiGetLists() {
  const res = await fetch(`${API_BASE}/lists`);
  if (!res.ok) throw new Error('Failed to load lists');
  return res.json();
}

async function apiGetTasks() {
  const res = await fetch(`${API_BASE}/tasks`);
  if (!res.ok) throw new Error('Failed to load tasks');
  return res.json();
}

async function apiCreateTask(payload) {
  const res = await fetch(`${API_BASE}/tasks`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload),
  });
  if (!res.ok) throw new Error('Failed to create task');
  return res.json();
}

async function apiSetTaskDone(id, done) {
  const res = await fetch(`${API_BASE}/tasks/${id}`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ done }),
  });
  if (!res.ok) throw new Error('Failed to update task');
  return res.json();
}

async function apiDeleteTasks(ids) {
  const res = await fetch(`${API_BASE}/tasks`, {
    method: 'DELETE',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ ids }),
  });
  if (!res.ok) throw new Error('Failed to delete tasks');
  return res.json();
}

function App() {
  const [tasks, setTasks] = React.useState([]);
  const [lists, setLists] = React.useState([]);
  const [loading, setLoading] = React.useState(true);
  const [loadError, setLoadError] = React.useState(null);
  const [filter, setFilter] = React.useState('open');
  const [nav, setNav] = React.useState('today');
  const [activeList, setActiveList] = React.useState(null);

  React.useEffect(() => {
    Promise.all([apiGetLists(), apiGetTasks()])
      .then(([listRows, taskRows]) => {
        setLists(listRows);
        setTasks(taskRows.map(decorate));
      })
      .catch((err) => setLoadError(err.message))
      .finally(() => setLoading(false));
  }, []);

  React.useEffect(() => { window.lucide && window.lucide.createIcons(); }, [nav, activeList, tasks, filter, loading]);

  const toggle = (id) => {
    const target = tasks.find(t => t.id === id);
    if (!target) return;
    const nextDone = !target.done;
    setTasks(ts => ts.map(t => t.id === id ? { ...t, done: nextDone } : t));
    apiSetTaskDone(id, nextDone).catch(() => {
      setTasks(ts => ts.map(t => t.id === id ? { ...t, done: !nextDone } : t));
    });
  };

  const addTask = ({ title, listId, dateKey, dueTime }) => {
    const value = title.trim();
    const list = lists.find(l => l.id === listId);
    if (!value || !list) return;
    setFilter('open');
    apiCreateTask({ title: value, listId, dateKey: dateKey || TODAY_KEY, dueTime: dueTime || '' })
      .then((created) => setTasks(ts => [decorate(created), ...ts]))
      .catch((err) => setLoadError(err.message));
  };
  const add = (title) => addTask({ title, listId: 'suanfa', dateKey: TODAY_KEY, dueTime: '' });

  const removeTasks = (ids) => {
    setTasks(ts => ts.filter(t => !ids.includes(t.id)));
    apiDeleteTasks(ids).catch((err) => setLoadError(err.message));
  };

  const handleNavigate = (page, listId) => { setNav(page); setActiveList(listId || null); };

  const listsWithCounts = lists.map(l => ({ ...l, open: tasks.filter(t => t.listId === l.id && !t.done).length }));
  const todayTasks = tasks.filter(t => t.scheduled === 'today' || !t.scheduled);
  const todayOpenCount = todayTasks.filter(t => !t.done).length;
  const currentList = listsWithCounts.find(l => l.id === activeList);

  function renderPage() {
    switch (nav) {
      case 'upcoming':
        return <UpcomingView tasks={tasks} onToggle={toggle} />;
      case 'all':
        return <AllTasksView tasks={tasks} onToggle={toggle} onAdd={addTask} onDelete={removeTasks} lists={listsWithCounts} />;
      case 'interviews':
        return <InterviewPrepView tasks={tasks} onToggle={toggle} />;
      case 'list':
        return <ListView list={currentList} tasks={tasks} onToggle={toggle} />;
      default:
        return <TodayView tasks={todayTasks} onToggle={toggle} onAdd={add} filter={filter} onFilter={setFilter} />;
    }
  }

  if (loading) {
    return (
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', height: '100%', color: 'var(--text-muted)', fontSize: 15 }}>
        Loading…
      </div>
    );
  }

  if (loadError) {
    return (
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', height: '100%', color: 'var(--danger)', fontSize: 15, textAlign: 'center', padding: 24 }}>
        Can't reach the Ace backend at {API_BASE}. Make sure it's running (npm start in backend/). {loadError}
      </div>
    );
  }

  return (
    <div style={{ display: 'flex', height: '100%' }}>
      <Sidebar active={nav} activeList={activeList} onNavigate={handleNavigate} lists={listsWithCounts} todayCount={todayOpenCount} />
      {renderPage()}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
