<!-- @dsCard group="Type" viewport="700x180" name="Display & headings" subtitle="Plus Jakarta Sans, tight tracking" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; font-family:var(--font-sans); background:var(--surface-card); color:var(--text-strong); padding:22px; }
  .line { display:flex; align-items:baseline; gap:14px; padding:7px 0; border-bottom:1px solid var(--border-subtle); }
  .line:last-child { border:none; }
  .meta { font-family:var(--font-mono); font-size:11px; color:var(--text-faint); white-space:nowrap; min-width:108px; }
  .t { letter-spacing:var(--tracking-tight); line-height:1.1; }
</style></head>
<body>
  <div class="line"><span class="t" style="font-size: 20px; font-weight: 800; color: rgb(57, 196, 103)">Plan it.</span><span class="meta">Display · 44 / 800</span></div>
  <div class="line"><span class="t" style="font-size: 34px; font-weight: 700; color: rgb(33, 98, 229)">Today's focus</span><span class="meta">H1 · 34 / 700</span></div>
  <div class="line"><span class="t" style="font-size: 27px; font-weight: 700; color: rgb(40, 199, 225)">This week</span><span class="meta">H2 · 27 / 700</span></div>
  <div class="line"><span class="t" style="font-size: 22px; font-weight: 600; color: rgb(207, 34, 34)">Interview </span><span class="meta">H3 · 22 / 600</span></div>
</body></html>
