<!-- @dsCard group="Type" viewport="700x150" name="Mono numerics" subtitle="JetBrains Mono — counts, dates, progress" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; font-family:var(--font-sans); background:var(--surface-card); color:var(--text-strong); padding:22px; display:flex; gap:28px; align-items:center; flex-wrap:wrap; }
  .item { display:flex; flex-direction:column; gap:4px; }
  .big { font-family:var(--font-mono); font-weight:600; }
  .cap { font-size:11px; color:var(--text-muted); }
</style></head>
<body>
  <div class="item"><span class="big" style="font-size:40px">7/12</span><span class="cap">Tasks done</span></div>
  <div class="item"><span class="big" style="font-size:40px;color:var(--cat-interview)">3d</span><span class="cap">Until interview</span></div>
  <div class="item"><span class="big" style="font-size:40px;color:var(--success)">86%</span><span class="cap">Week progress</span></div>
  <div class="item"><span class="big" style="font-size:24px">Jun 22 · 9:30</span><span class="cap">Due date format</span></div>
</body></html>
