<!-- @dsCard group="Type" viewport="700x180" name="Body & UI text" subtitle="Reading & interface sizes" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; font-family:var(--font-sans); color:var(--text-body); padding:22px; background:var(--surface-card); }
  .line { display:flex; align-items:baseline; gap:14px; padding:6px 0; border-bottom:1px solid var(--border-subtle); }
  .line:last-child { border:none; }
  .meta { font-family:var(--font-mono); font-size:11px; color:var(--text-faint); white-space:nowrap; min-width:120px; margin-left:auto; }
</style></head>
<body>
  <div class="line"><span style="font-size:18px;font-weight:500;color:var(--text-strong)">Large — section intros and emphasis</span><span class="meta">lg · 18 / 500</span></div>
  <div class="line"><span style="font-size:16px">Base — the default for task titles and reading</span><span class="meta">base · 16 / 400</span></div>
  <div class="line"><span style="font-size:14px">Small — secondary labels, metadata, hints</span><span class="meta">sm · 14 / 400</span></div>
  <div class="line"><span style="font-size:12px;color:var(--text-muted)">Extra small — timestamps, captions</span><span class="meta">xs · 12 / 400</span></div>
  <div class="line"><span style="font-size:11px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--text-faint)">Overline label</span><span class="meta">2xs · 11 / 700 caps</span></div>
</body></html>
