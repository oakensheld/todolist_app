<!-- @dsCard group="Brand" viewport="700x220" name="Logo" subtitle="Mark, wordmark & on-color use" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; font-family:var(--font-sans); background:var(--surface-card); padding:0; display:flex; }
  .cell { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; padding:28px; min-height:220px; box-sizing:border-box; }
  .lbl { font-size:11px; font-weight:700; letter-spacing:0.06em; text-transform:uppercase; color:var(--text-faint); }
  .onblue { background:var(--blue-500); }
  .onblue .lbl { color:rgba(255,255,255,0.7); }
  .div { width:1px; background:var(--border-subtle); }
</style></head>
<body>
  <div class="cell"><img src="../assets/logo-mark.svg" width="72" height="72" alt="Ace mark" /><span class="lbl">JUST DO IT
</span></div>
  <div class="div"></div>
  <div class="cell"><img src="../assets/logo-wordmark.svg" height="48" alt="Ace wordmark" /><span class="lbl">Wordmark</span></div>
  <div class="div"></div>
  <div class="cell onblue"><img src="../assets/logo-wordmark-inverse.svg" height="48" alt="Ace inverse" /><span class="lbl">On brand blue</span></div>
</body></html>
